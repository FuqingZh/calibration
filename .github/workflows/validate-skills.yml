name: Validate skills

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-skills:
    name: validate-skills
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-validation.txt

      - name: Install validation dependency
        run: python -m pip install --requirement requirements-validation.txt

      - name: Test skill validator
        run: python -m unittest discover --start-directory tests --verbose

      - name: Validate skills
        run: python scripts/validate_skills.py

      - name: Check installer syntax
        run: bash -n install.sh

      - name: Preview installer
        run: bash install.sh --dry-run
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home

      - name: Check pull request diff
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: git diff --check "$BASE_SHA...$HEAD_SHA"

      - name: Check pushed commit range
        if: github.event_name == 'push'
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: git diff --check "$BASE_SHA..$HEAD_SHA"
