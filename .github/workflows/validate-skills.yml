name: Validate skills

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-skills:
    name: validate-skills
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"
          version: "2.26.9"
          cache: true
          cache-dependency-path: pdm.lock

      - name: Check dependency lock
        run: pdm lock --check

      - name: Install locked validation environment
        run: pdm sync --clean

      - name: Run repository quality gate
        run: pdm run check

      - name: Preview installer
        run: bash install.sh --dry-run
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home

      - name: Check pull request diff
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: git diff --check "$BASE_SHA...$HEAD_SHA"

      - name: Check pushed commit range
        if: github.event_name == 'push'
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: git diff --check "$BASE_SHA..$HEAD_SHA"
